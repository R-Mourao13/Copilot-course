name: Deploy game to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true ativa o Pages automaticamente (sem mexer nas Settings)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload game folder as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
